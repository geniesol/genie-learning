services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///run/podman/podman.sock"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/run/user/1000/podman/podman.sock:/run/podman/podman.sock:ro"
    networks:
      - genie_network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: genie_learning
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - genie_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - genie_network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - genie_network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - genie_network

  api-core:
    image: localhost/genie-api:latest
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/genie_learning?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret
      - STRIPE_SECRET_KEY=sk_test_123
    ports:
      - "3001:3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
    depends_on:
      - postgres
      - redis
    networks:
      - genie_network

  web-frontend:
    image: localhost/genie-web-frontend:latest
    environment:
      - NEXT_PUBLIC_API_URL=http://api.localhost
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`localhost`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    ports:
      - "3000:3000"
    depends_on:
      - api-core
    networks:
      - genie_network

  ai-service:
    image: localhost/genie-ai-service:latest
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/genie_learning?schema=public
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-test}
    ports:
      - "3002:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`ai.localhost`)"
      - "traefik.http.services.ai.loadbalancer.server.port=3001"
    depends_on:
      - qdrant
    networks:
      - genie_network


networks:
  genie_network:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  qdrant-data:
  minio-data:
