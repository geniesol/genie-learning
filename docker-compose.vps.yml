services:
  traefik:
    image: docker.io/library/traefik:v3.0
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///run/podman/podman.sock"
      - "--entrypoints.web.address=:80"
    ports:
      - "8880:80"
      - "8888:8080"
    volumes:
      - "/run/podman/podman.sock:/run/podman/podman.sock:ro"
    networks:
      - genie_network

  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: genie_learning
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      genie_network:
        ipv4_address: 10.89.0.10

  redis:
    image: docker.io/library/redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      genie_network:
        ipv4_address: 10.89.0.11

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    restart: always
    ports:
      - "6343:6333"
      - "6344:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      genie_network:
        ipv4_address: 10.89.0.12

  minio:
    image: docker.io/minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio-data:/data
    networks:
      genie_network:
        ipv4_address: 10.89.0.13

  api-core:
    image: localhost/genie-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://root:password@10.89.0.10:5432/genie_learning?schema=public
      - REDIS_URL=redis://10.89.0.11:6379
      - JWT_SECRET=supersecret
      - STRIPE_SECRET_KEY=sk_test_123
    ports:
      - "4001:3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=(Host(`72.60.204.70`) || Host(`dev.genielearning.in`)) && PathPrefix(`/api`)"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.api.middlewares=api-strip"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
    depends_on:
      - postgres
      - redis
    networks:
      genie_network:
        ipv4_address: 10.89.0.100

  web-frontend:
    image: localhost/genie-web-frontend:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://dev.genielearning.in/api
      - INTERNAL_API_URL=http://10.89.0.100:3001
      - INTERNAL_AI_URL=http://10.89.0.101:3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`72.60.204.70`) || Host(`dev.genielearning.in`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    ports:
      - "4000:3000"
    depends_on:
      - api-core
    networks:
      - genie_network

  ai-service:
    image: localhost/genie-ai-service:latest
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://root:password@10.89.0.10:5432/genie_learning?schema=public
      - QDRANT_URL=http://10.89.0.12:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-test}
    ports:
      - "4002:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=(Host(`72.60.204.70`) || Host(`dev.genielearning.in`)) && PathPrefix(`/ai`)"
      - "traefik.http.middlewares.ai-strip.stripprefix.prefixes=/ai"
      - "traefik.http.routers.ai.middlewares=ai-strip"
      - "traefik.http.services.ai.loadbalancer.server.port=3000"
    depends_on:
      - qdrant
      - postgres
    networks:
      genie_network:
        ipv4_address: 10.89.0.101

networks:
  genie_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.0.0/24

volumes:
  pg-data:
  redis-data:
  qdrant-data:
  minio-data:
